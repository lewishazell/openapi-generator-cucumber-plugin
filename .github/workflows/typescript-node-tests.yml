name: typescript-node-tests

on:
  push:
    branches:
      - main
    pull_request:

jobs:
  generate-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '24.4.1'

      - name: Install npm tools
        run: npm install -g @stoplight/prism-cli@5.14.2 @openapitools/openapi-generator-cli@2.22.0

      - name: Install jd
        run: |
          curl -L https://github.com/josephburnett/jd/releases/download/v2.5.0/jd-amd64-linux -o jd
          chmod +x jd
          sudo mv jd /usr/local/bin/

      - name: Install shUnit2
        run: sudo apt install shunit2 -y

      - name: Test typescript-node codegen
        run: ./test_codegen.sh --filter testTypeScriptNodeCodegen
        working-directory: tests
