name: python-tests

on:
  push:
    branches:
      - main
    pull_request:

jobs:
  generate-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install npm tools
        run: npm install -g @stoplight/prism-cli@5.14.2 @openapitools/openapi-generator-cli@2.22.0

      - name: Install shUnit2
        run: sudo apt install shunit2 -y

      - name: Test python codegen
        run: ./test_codegen.sh --filter testPythonCodegen
        working-directory: tests
